name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Client Build and Test
  client-build:
    name: Client Build & Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: Install dependencies
        working-directory: ./client
        run: npm ci
      
      - name: Lint check (if available)
        working-directory: ./client
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Build project
        working-directory: ./client
        run: npm run build
      
      - name: Run tests (if available)
        working-directory: ./client
        run: npm test --if-present -- --watchAll=false --passWithNoTests
        env:
          CI: true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/build/
          retention-days: 7

  # Server Build and Test
  server-build:
    name: Server Build & Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install dependencies
        working-directory: ./server
        run: npm ci
      
      - name: Lint check (if available)
        working-directory: ./server
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Run tests (if available)
        working-directory: ./server
        run: npm test --if-present
        continue-on-error: true

  # Smart Contract Build and Test
  contract-build:
    name: Smart Contract Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: contract/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run tests
        working-directory: ./contract
        run: cargo test --verbose
      
      - name: Build WASM
        working-directory: ./contract
        run: cargo build --target wasm32-unknown-unknown --release
      
      - name: Check WASM size
        working-directory: ./contract
        run: |
          SIZE=$(stat -c%s target/wasm32-unknown-unknown/release/rentledger.wasm 2>/dev/null || stat -f%z target/wasm32-unknown-unknown/release/rentledger.wasm)
          echo "WASM size: $SIZE bytes"
          if [ $SIZE -gt 65536 ]; then
            echo "⚠️  Warning: WASM size exceeds 64KB"
          fi

  # Overall Status Check
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [client-build, server-build, contract-build]
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.client-build.result }}" != "success" ] || \
             [ "${{ needs.server-build.result }}" != "success" ] || \
             [ "${{ needs.contract-build.result }}" != "success" ]; then
            echo "❌ CI Pipeline Failed"
            exit 1
          fi
          echo "✅ CI Pipeline Passed"
