name: Deploy Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

env:
  NODE_VERSION: '18'
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # Deploy Frontend to Vercel
  deploy-frontend:
    name: 🚀 Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      
      - name: 📦 Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: 🔗 Pull Vercel Environment Information
        working-directory: ./client
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: 🏗️ Build Project Artifacts
        working-directory: ./client
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: 🚀 Deploy to Vercel
        id: deploy
        working-directory: ./client
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOYMENT_URL"
      
      - name: 📝 Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Frontend deployed to: ${{ steps.deploy.outputs.deployment_url }}'
            })
      
      - name: 🎉 Deployment Summary
        run: |
          echo "### 🚀 Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** ${{ steps.deploy.outputs.deployment_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

  # Build and Push Docker Images (Optional)
  deploy-backend-docker:
    name: 🐳 Build Backend Docker Image
    runs-on: ubuntu-latest
    if: false  # Set to true to enable Docker deployment
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: 🏗️ Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/rentledger-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/rentledger-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rentledger-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/rentledger-backend:buildcache,mode=max
      
      - name: 🎉 Docker build summary
        run: |
          echo "### 🐳 Docker Image Built!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ secrets.DOCKER_USERNAME }}/rentledger-backend:latest" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # Deploy Smart Contract (Manual trigger recommended)
  deploy-contract:
    name: 📜 Deploy Smart Contract
    runs-on: ubuntu-latest
    if: false  # Set to true to enable automatic contract deployment
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🦀 Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      
      - name: 🏗️ Build optimized WASM
        working-directory: ./contract
        run: cargo build --target wasm32-unknown-unknown --release
      
      - name: 📦 Install Stellar CLI
        run: |
          cargo install --locked stellar-cli --features opt || echo "Stellar CLI installation skipped"
      
      - name: 🚀 Deploy to Stellar Testnet
        working-directory: ./contract
        env:
          STELLAR_SECRET_KEY: ${{ secrets.STELLAR_SECRET_KEY }}
        run: |
          echo "⚠️ Contract deployment requires manual verification"
          echo "WASM file ready at: target/wasm32-unknown-unknown/release/rentledger.wasm"
          # Uncomment below to deploy automatically (not recommended for production)
          # stellar contract deploy \
          #   --wasm target/wasm32-unknown-unknown/release/rentledger.wasm \
          #   --source $STELLAR_SECRET_KEY \
          #   --network testnet

  # Deployment Success
  deploy-success:
    name: ✅ Deployment Complete
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    if: always()
    
    steps:
      - name: 🎊 Deployment status
        run: |
          if [ "${{ needs.deploy-frontend.result }}" == "success" ]; then
            echo "✅ Deployment completed successfully!"
            echo "🌐 Frontend is live on Vercel"
            exit 0
          else
            echo "❌ Deployment failed"
            echo "Frontend: ${{ needs.deploy-frontend.result }}"
            exit 1
          fi
      
      - name: 📊 Create deployment report
        if: success()
        run: |
          echo "### 🎉 Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Status:** Successful" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "👤 **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
